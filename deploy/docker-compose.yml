services:
  mysql:
    image: mysql:8.0.45
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: conorder_db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uroot", "-proot"] 
      interval: 2s
      timeout: 3s
      retries: 3
    networks:
      - qsys-network
  redis:
    image: redis:7.2.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - qsys-network
  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - qsys-network

  # 3 brokers
  kafka-1:
    image: apache/kafka:3.7.0
    platform: linux/arm64
    container_name: kafka-1
    mem_limit: 512m
    cpus: 0.5
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9095,3@kafka-3:9097
      # 内部同步(19092)、外部发单(9092)、选举控制(9093)
      - KAFKA_LISTENERS=INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-1:19092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_HEAP_OPTS=-Xmx256M -Xms256M
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_LOG_SEGMENT_BYTES=104857600  # 100MB
    ports:
      - "9092:9092"
    networks:
      - qsys-network
  kafka-2:
    image: apache/kafka:3.7.0
    platform: linux/arm64
    container_name: kafka-2
    mem_limit: 512m
    cpus: 0.5
    environment:
      - KAFKA_NODE_ID=2
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9095,3@kafka-3:9097
      - KAFKA_LISTENERS=INTERNAL://:19092,EXTERNAL://:9094,CONTROLLER://:9095
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-2:19092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_HEAP_OPTS=-Xmx256M -Xms256M
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
    ports:
      - "9094:9094"
    networks:
      - qsys-network
  kafka-3:
    image: apache/kafka:3.7.0
    platform: linux/arm64
    container_name: kafka-3
    mem_limit: 512m
    cpus: 0.5
    environment:
      - KAFKA_NODE_ID=3
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9095,3@kafka-3:9097
      - KAFKA_LISTENERS=INTERNAL://:19092,EXTERNAL://:9096,CONTROLLER://:9097
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-3:19092,EXTERNAL://localhost:9096
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_HEAP_OPTS=-Xmx256M -Xms256M
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
    ports:
      - "9096:9096"
    networks:
      - qsys-network

  nginx:
    image: nginx:1.28.3-alpine
    container_name: qsys-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cli_svr1
      - cli_svr2
    networks:
      - qsys-network
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
  
  # 查询服务实例
  cli_svr1:
    build: 
      context: ..
      dockerfile: ./deploy/cli.Dockerfile
    container_name: qsys-cli-1
    environment:
      - SERVER_NAME=qsys-cli-1
      - QSYS_ENV=prod
    networks:
      - qsys-network
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
  cli_svr2:
    build:
      context: ..
      dockerfile: ./deploy/cli.Dockerfile
    container_name: qsys-cli-2
    environment:
      - SERVER_NAME=qsys-cli-2
      - QSYS_ENV=prod
    networks:
      - qsys-network
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: qsys-prometheus
    extra_hosts:
      - "qsys-sim:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - qsys-network
  mysql-exporter:
    image: prom/mysqld-exporter:v0.17.2
    container_name: qsys-mysql-exporter
    command:
      - '--mysqld.address=deploy-mysql-1:3306'
      - '--mysqld.username=root:root'
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - qsys-network
  redis-exporter:
    image: oliver006/redis_exporter:v1.80.0-alpine
    container_name: qsys-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_EXPORTER_CHECK_KEYS=qsys:active_clients
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - qsys-network
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: qsys-kafka-exporter
    command: 
      - "--kafka.server=kafka-1:19092"
      - "--kafka.server=kafka-2:19092"
      - "--kafka.server=kafka-3:19092"
    ports:
      - "9308:9308"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - qsys-network
      
networks:
  qsys-network:
    driver: bridge