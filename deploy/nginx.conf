worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    limit_req_zone $http_x_real_ip zone=ip_limit:10m rate=50r/s;
    limit_req_zone $server_name zone=global_limit:100m rate=7500r/s;

    upstream qsys_backend {
        # Go HTTP svr port
        # 默认轮询 (Round robin)
        # or:
        # ip_hash
        server qsys-cli-1:8080; 
        server qsys-cli-2:8080;
    }

    server {
        listen 80;

        location / {
            limit_req zone=ip_limit burst=30 nodelay;
            limit_req zone=global_limit burst=6400 nodelay;
            proxy_pass http://qsys_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}