worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream qsys_backend {
        # Go HTTP svr port
        # 默认轮询 (Round robin)
        # or:
        # ip_hash
        server qsys-cli-1:8080; 
        server qsys-cli-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://qsys_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}